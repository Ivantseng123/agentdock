server:
  port: 8080

slack:
  bot_token: "xoxb-your-token"
  app_token: "xapp-your-app-token"

# Auto-bind: bot auto-registers when invited to a channel
auto_bind: true

channel_defaults:
  branch_select: true
  default_labels: ["from-slack"]

# Optional: override defaults for specific channels
# channels:
#   C05XXXXXX:
#     repos:
#       - "org/backend"
#       - "org/frontend"
#     default_labels: ["from-slack"]
#   C05YYYYYY:
#     repo: "org/backend-repo"
#     branch_select: true
#     branches: ["main", "develop"]

github:
  token: "ghp_your-token"

# === Agents ===
# CLI agents are spawned as subprocesses. Tried in fallback order.
agents:
  claude:
    command: claude
    args: ["--print", "-p", "{prompt}"]
    timeout: 5m
  opencode:
    command: opencode
    args: ["--prompt", "{prompt}"]
    timeout: 5m
  # codex:
  #   command: codex
  #   args: ["{prompt}"]
  #   timeout: 5m
  # gemini:
  #   command: gemini
  #   args: ["--prompt", "{prompt}"]
  #   timeout: 5m

active_agent: claude
fallback: [claude, opencode]

# === Prompt ===
prompt:
  language: "繁體中文"
  extra_rules:
    - "列出所有相關的檔案名稱與完整路徑"

repo_cache:
  dir: "/tmp/slack-issue-bot/repos"
  max_age: 1h

rate_limit:
  per_user: 5
  per_channel: 20
  window: 1h

max_concurrent: 3
max_thread_messages: 50

# Optional: Mantis integration
# mantis:
#   base_url: https://mantis.example.com
#   api_token: your-token
